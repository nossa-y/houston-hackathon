<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HOUSTON - mission control for computer-use agents</title>
<style>
  :root{
    --bg:#070b12; --panel:#0d1420; --panel2:#111a29; --line:#1c2940;
    --text:#dbe7f5; --dim:#6b7f9c; --mono:ui-monospace,'SF Mono',Menlo,monospace;
    --green:#34d399; --red:#fb7185; --amber:#fbbf24; --cyan:#67e8f9; --blue:#60a5fa;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font:15px/1.5 -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}
  .wrap{max-width:1240px;margin:0 auto;padding:22px 28px}
  header{display:flex;align-items:baseline;gap:16px;border-bottom:1px solid var(--line);padding-bottom:14px}
  .logo{font:800 26px/1 var(--mono);letter-spacing:.35em}
  .logo b{color:var(--green)}
  .tag{color:var(--dim);font-size:13px}
  .chain{margin-left:auto;font:12px var(--mono);color:var(--dim)}
  .chain .ok{color:var(--green)}
  main{display:grid;grid-template-columns:1fr 360px;gap:20px;margin-top:20px}
  @media(max-width:980px){main{grid-template-columns:1fr}}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:18px}
  .taskrow{display:flex;gap:10px}
  .taskrow input{flex:1;background:var(--panel2);border:1px solid var(--line);border-radius:9px;color:var(--text);padding:12px 14px;font-size:15px;outline:none}
  .taskrow input:focus{border-color:var(--blue)}
  .btn{background:var(--green);border:0;border-radius:9px;color:#04110b;font-weight:700;padding:12px 20px;cursor:pointer;font-size:14px;letter-spacing:.02em}
  .btn:disabled{opacity:.4;cursor:default}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--dim);font-weight:500}
  .phases{display:flex;gap:8px;margin:18px 0 6px;flex-wrap:wrap}
  .phase{font:600 11px/1 var(--mono);letter-spacing:.14em;color:var(--dim);border:1px solid var(--line);border-radius:99px;padding:8px 14px;transition:all .3s}
  .phase.active{color:#04110b;background:var(--blue);border-color:var(--blue)}
  .phase.active.heal{background:var(--amber);border-color:var(--amber)}
  .phase.active.arbiter{background:var(--cyan);border-color:var(--cyan)}
  .phase.done{color:var(--green);border-color:var(--green)}
  .feed{margin-top:14px;display:flex;flex-direction:column;gap:8px;max-height:290px;overflow-y:auto;padding-right:4px}
  .ev{font:13px var(--mono);color:var(--dim);padding:7px 12px;background:var(--panel2);border-radius:8px;border-left:2px solid var(--line);animation:in .25s ease}
  .ev.say{color:var(--text);border-left-color:var(--green)}
  .ev a{color:var(--blue);text-decoration:none}
  @keyframes in{from{opacity:0;transform:translateY(4px)}to{opacity:1}}
  .card{margin-top:14px;border-radius:12px;padding:16px;border:1px solid var(--line);background:var(--panel2);animation:in .3s ease}
  .card h3{font:700 12px var(--mono);letter-spacing:.18em;color:var(--dim);margin-bottom:8px}
  .card.claim{border-left:3px solid var(--blue)}
  .card.rejected{border-left:3px solid var(--red)}
  .card.rejected h3{color:var(--red)}
  .card.confirmed{border-left:3px solid var(--green)}
  .card.confirmed h3{color:var(--green)}
  .card.heal{border-left:3px solid var(--amber)}
  .card.heal h3{color:var(--amber)}
  .card.arb{border-left:3px solid var(--cyan)}
  .card.arb h3{color:var(--cyan)}
  .card pre{white-space:pre-wrap;font:13px/1.55 var(--mono);color:var(--text)}
  .claims{width:100%;border-collapse:collapse;margin-top:8px;font:12.5px var(--mono)}
  .claims td{padding:6px 8px;border-top:1px solid var(--line);vertical-align:top}
  .claims .ok{color:var(--green)} .claims .bad{color:var(--red)}
  .links{margin-top:10px;display:flex;gap:12px;flex-wrap:wrap}
  .links a{font:12px var(--mono);color:var(--blue);text-decoration:none;border:1px solid var(--line);padding:6px 12px;border-radius:8px}
  .links a:hover{border-color:var(--blue)}
  .receipts h2{font:700 13px var(--mono);letter-spacing:.2em;color:var(--dim);margin-bottom:12px}
  .receipt{border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:10px;background:var(--panel2)}
  .receipt .top{display:flex;justify-content:space-between;align-items:center;font:12px var(--mono)}
  .status{font:700 10.5px var(--mono);letter-spacing:.1em;padding:3px 9px;border-radius:99px}
  .status.verified,.status.s-verified-by-arbiter{background:rgba(52,211,153,.14);color:var(--green)}
  .status.unverified,.status.error{background:rgba(251,113,133,.14);color:var(--red)}
  .status.other{background:rgba(103,232,249,.14);color:var(--cyan)}
  .receipt .task{color:var(--dim);font-size:12.5px;margin-top:6px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
  .receipt .meta{margin-top:8px;font:11px var(--mono);color:var(--dim);display:flex;gap:10px;flex-wrap:wrap}
  .receipt .meta span{white-space:nowrap}
  .hash{color:var(--cyan)}
  .toggles{display:flex;gap:14px;align-items:center;margin-top:12px;color:var(--dim);font-size:13px}
  .toggles label{display:flex;gap:6px;align-items:center;cursor:pointer}
  .empty{color:var(--dim);font-size:13px;text-align:center;padding:26px 0}
  .aud{display:inline-block;width:7px;height:7px;border-radius:99px;background:var(--dim);margin-right:6px}
  .aud.on{background:var(--green);box-shadow:0 0 8px var(--green)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">H<b>OU</b>STON</div>
    <div class="tag">mission control for computer-use agents - never trust, always verify</div>
    <div class="chain" id="chain"></div>
  </header>
  <main>
    <section>
      <div class="panel">
        <div class="taskrow">
          <input id="task" placeholder='Give the agent a mission - type it, or press the mic and speak it' />
          <button class="btn ghost" id="mic" title="speak the mission">🎙</button>
          <button class="btn" id="launch">LAUNCH</button>
        </div>
        <div class="toggles">
          <label><input type="checkbox" id="voice" checked><span><span class="aud" id="audot"></span>voice narration (Gradium)</span></label>
          <label><input type="checkbox" id="localaudit" checked>on-device evidence audit (local Holo 3.1)</label>
        </div>
        <div class="phases" id="phases">
          <div class="phase" data-p="attempt">ATTEMPT</div>
          <div class="phase" data-p="audit">AUDIT</div>
          <div class="phase heal" data-p="heal">HEAL</div>
          <div class="phase arbiter" data-p="arbiter">ARBITER</div>
          <div class="phase" data-p="proof">PROOF</div>
        </div>
        <div class="feed" id="feed"></div>
        <div id="cards"></div>
      </div>
    </section>
    <aside class="panel receipts">
      <h2>RECEIPTS</h2>
      <div id="receipts"><div class="empty">No missions yet tonight.</div></div>
    </aside>
  </main>
</div>
<script>
const $=s=>document.querySelector(s);
const feed=$('#feed'), cards=$('#cards');
let audioQ=[], playing=false;

function speak(text){
  if(!$('#voice').checked||!text) return;
  audioQ.push(text); drain();
}
async function drain(){
  if(playing||!audioQ.length) return;
  playing=true; $('#audot').classList.add('on');
  const text=audioQ.shift();
  try{
    const a=new Audio('/api/tts?text='+encodeURIComponent(text));
    await a.play();
    await new Promise(r=>{a.onended=r; a.onerror=r;});
  }catch(e){}
  playing=false; $('#audot').classList.remove('on');
  drain();
}
function ev(text, isSay, html){
  const d=document.createElement('div');
  d.className='ev'+(isSay?' say':'');
  if(html) d.innerHTML=html; else d.textContent=text;
  feed.appendChild(d); feed.scrollTop=feed.scrollHeight;
}
function setPhase(p){
  document.querySelectorAll('.phase').forEach(x=>{
    if(x.dataset.p===p){x.classList.add('active');}
    else if(x.classList.contains('active')){x.classList.remove('active');x.classList.add('done');}
  });
}
function card(cls,title,body){
  const d=document.createElement('div');
  d.className='card '+cls;
  d.innerHTML='<h3>'+title+'</h3>'+body;
  cards.appendChild(d); d.scrollIntoView({behavior:'smooth',block:'nearest'});
  return d;
}
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}

function claimsTable(claims){
  if(!claims||!claims.length) return '';
  return '<table class="claims">'+claims.map(c=>
    '<tr><td class="'+(c.matches?'ok':'bad')+'">'+(c.matches?'OK':'✗')+'</td><td>'+esc(c.claim)+'</td><td style="color:var(--dim)">'+esc(c.observed)+'</td></tr>'
  ).join('')+'</table>';
}

async function loadReceipts(){
  const r=await fetch('/api/receipts'); const j=await r.json();
  $('#chain').innerHTML='chain '+(j.chain_intact?'<span class="ok">INTACT</span>':'<span style="color:var(--red)">BROKEN</span>')+' · '+j.receipts.length+' receipts';
  const box=$('#receipts');
  if(!j.receipts.length){box.innerHTML='<div class="empty">No missions yet tonight.</div>';return;}
  box.innerHTML=j.receipts.map(rc=>{
    const s=rc.final_status||'unknown';
    const cls=s==='verified'?'verified':(s.startsWith('verified-by')||s.startsWith('corrected')?'other':(s==='unverified'||s==='error'?'unverified':'other'));
    return '<div class="receipt">'+
      '<div class="top"><span>'+rc.mission_id+'</span><span class="status '+cls+'">'+esc(s.toUpperCase())+'</span></div>'+
      '<div class="task">'+esc(rc.task)+'</div>'+
      '<div class="meta">'+
        '<span>'+(rc.attempts?rc.attempts.length:0)+' attempt(s)</span>'+
        '<span>'+(rc.total_elapsed_s||0)+'s</span>'+
        '<span class="hash">#'+esc(rc.hash||'')+'</span>'+
        (rc.agent_view?'<span><a style="color:var(--blue)" target="_blank" href="'+rc.agent_view+'">replay ↗</a></span>':'')+
      '</div></div>';
  }).join('');
}

async function launch(){
  const task=$('#task').value.trim(); if(!task) return;
  $('#launch').disabled=true; feed.innerHTML=''; cards.innerHTML='';
  document.querySelectorAll('.phase').forEach(x=>x.classList.remove('active','done'));
  const res=await fetch('/api/missions',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({task, local_audit:$('#localaudit').checked})});
  const {mission_id}=await res.json();
  const es=new EventSource('/api/stream/'+mission_id);
  es.onmessage=m=>{
    const {kind,data,say}=JSON.parse(m.data);
    if(say){ev(say,true); speak(say);}
    if(kind==='phase') setPhase(data.phase);
    if(kind==='executor_started') ev('',false,'executor session <a target="_blank" href="'+data.agent_view+'">'+data.session_id.slice(0,8)+'… watch live ↗</a>');
    if(kind==='verifier_started') ev('',false,'verifier session <a target="_blank" href="'+data.agent_view+'">'+data.session_id.slice(0,8)+'… watch live ↗</a>');
    if(kind==='arbiter_started') ev('',false,'arbiter session <a target="_blank" href="'+data.agent_view+'">'+data.session_id.slice(0,8)+'… watch live ↗</a>');
    if(kind==='milestone') ev(data.text);
    if(kind==='agent_message') ev(data.text);
    if(kind==='claimed') card('claim','AGENT CLAIMS DONE - ATTEMPT '+data.n,'<pre>'+esc(data.answer)+'</pre>');
    if(kind==='verdict'){
      if(data.verified) card('confirmed','AUDIT: CONFIRMED · confidence '+Math.round(data.confidence*100)+'%',
        claimsTable(data.claims)+'<div class="links"><a target="_blank" href="'+data.verifier_view+'">audit replay ↗</a></div>');
      else card('rejected','AUDIT: REJECTED · confidence '+Math.round(data.confidence*100)+'%',
        '<pre>'+esc(data.divergence||'')+'</pre>'+claimsTable(data.claims)+
        '<div class="links"><a target="_blank" href="'+data.verifier_view+'">audit replay ↗</a></div>');
    }
    if(kind==='healing') card('heal','HEALING - RE-BRIEFING THE LIVE SESSION','<pre>'+esc(data.diagnosis||'')+'</pre>');
    if(kind==='arbiter_verdict') card('arb','ARBITER RULING: '+esc((data.winner||'').replace('_',' ').toUpperCase()),
      '<pre>'+esc(data.resolved_facts)+'</pre>'+(data.arbiter_view?'<div class="links"><a target="_blank" href="'+data.arbiter_view+'">arbiter replay ↗</a></div>':''));
    if(kind==='local_audit') card('confirmed','ON-DEVICE EVIDENCE AUDIT (LOCAL HOLO 3.1)',
      '<pre>'+esc(data.result||'')+'\n'+esc(data.engine||'')+' · '+data.latency_s+'s</pre>');
    if(kind==='receipt'){
      setPhase('proof');
      card(String(data.final_status).startsWith('verified')?'confirmed':'rejected',
        'RECEIPT SEALED · '+esc(String(data.final_status).toUpperCase()),
        '<pre>'+esc(data.final_answer||'')+'</pre>'+
        '<div class="links"><a target="_blank" href="'+data.agent_view+'">executor replay ↗</a>'+
        (data.verifier_views||[]).map((v,i)=>'<a target="_blank" href="'+v+'">audit '+(i+1)+' ↗</a>').join('')+
        '</div><div class="meta" style="margin-top:8px;font:11px var(--mono);color:var(--dim)">#'+esc(data.hash)+' ← #'+esc(data.prev_hash)+'</div>');
      loadReceipts();
    }
    if(kind==='mission_error'){card('rejected','MISSION ERROR','<pre>'+esc(data.error)+'</pre>');}
  };
  es.addEventListener('done',()=>{es.close();$('#launch').disabled=false;});
  es.onerror=()=>{es.close();$('#launch').disabled=false;};
}
$('#launch').onclick=launch;
$('#task').addEventListener('keydown',e=>{if(e.key==='Enter')launch();});
loadReceipts();

// ---- voice input: mic -> 24k PCM16 -> /api/stt (Gradium streaming STT) ----
let rec=null;
function pcm16b64(f32){
  const pcm=new Int16Array(f32.length);
  for(let i=0;i<f32.length;i++){const s=Math.max(-1,Math.min(1,f32[i]));pcm[i]=s<0?s*32768:s*32767;}
  let bin=''; const bytes=new Uint8Array(pcm.buffer);
  for(let i=0;i<bytes.length;i+=8192) bin+=String.fromCharCode.apply(null,bytes.subarray(i,i+8192));
  return btoa(bin);
}
async function micToggle(){
  if(rec){ // stop
    rec.ws.send(JSON.stringify({type:'eos'}));
    rec.proc.disconnect(); rec.src.disconnect(); rec.stream.getTracks().forEach(t=>t.stop());
    $('#mic').textContent='🎙'; $('#mic').style.borderColor='';
    rec=null; return;
  }
  const stream=await navigator.mediaDevices.getUserMedia({audio:{channelCount:1,echoCancellation:true}});
  const ws=new WebSocket((location.protocol==='https:'?'wss://':'ws://')+location.host+'/api/stt');
  let text='';
  ws.onmessage=m=>{
    const d=JSON.parse(m.data);
    if(d.type==='text'||d.type==='word'){ const tok=(d.text||d.word||'').trim(); if(tok){text=(text+' '+tok).replace(/ \./g,'.').replace(/ ,/g,',');} $('#task').value=text.trim(); }
    if(d.type==='transcript'||d.type==='final'){ if(d.text){text=d.text; $('#task').value=text.trim();} }
    if(d.type==='end_of_stream'){ ws.close(); if($('#task').value.trim()) launch(); }
    if(d.type==='error'){ ev('voice error: '+d.error); ws.close(); }
  };
  await new Promise(r=>{ws.onopen=r;});
  const ctx=new AudioContext({sampleRate:24000});
  const src=ctx.createMediaStreamSource(stream);
  const proc=ctx.createScriptProcessor(4096,1,1);
  proc.onaudioprocess=e=>{ if(ws.readyState===1) ws.send(JSON.stringify({audio:pcm16b64(e.inputBuffer.getChannelData(0))})); };
  src.connect(proc); proc.connect(ctx.destination);
  rec={stream,ws,src,proc,ctx};
  $('#mic').textContent='■'; $('#mic').style.borderColor='var(--red)';
}
$('#mic').onclick=()=>micToggle().catch(e=>ev('mic error: '+e.message));
</script>
</body>
</html>
